---
name: Barcode Buddy for Grocy
version: "2.0.0"
slug: bbuddy-grocy
description: Barcode system for Grocy
url: https://github.com/Forceu/barcodebuddy
webui: http://[HOST]:[PORT:80]
panel_icon: mdi:barcode-scan
startup: system
arch:
- aarch64
- amd64
- armv7
- i386
boot: auto
init: false
map:
  - type: addon_config
    read_only: false
ports:
  80/tcp: 8621
ports_description:
  80/tcp: Web interface
options:
  grocy_api_url: ""
  grocy_api_key: ""
  require_api_key: false
  disable_auth: false
  debug: false
  curl_allow_insecure_ssl_ca: false
  curl_allow_insecure_ssl_host: false
schema:
  grocy_api_url: str?
  grocy_api_key: password?
  require_api_key: bool
  disable_auth: bool
  debug: bool
  curl_allow_insecure_ssl_ca: bool
  curl_allow_insecure_ssl_host: bool
